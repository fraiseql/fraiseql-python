version: 2
updates:
  # Python dependencies - main project only
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
    groups:
      # Group all patch and minor updates into single PRs
      patch-and-minor:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      # Major updates get individual PRs for careful review
    # Ignore packages where we manage version constraints manually
    ignore:
      - dependency-name: "boto3"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "dependencies"
    groups:
      # Group all GH Actions updates into a single PR
      actions-updates:
        patterns:
          - "*"

  # Rust crate (native extension) - pyo3 bindings
  - package-ecosystem: "cargo"
    directory: "/fraiseql_rs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "rust"
      - "dependencies"
      - "security"
    groups:
      # Group all patch and minor updates into single PRs
      cargo-patch-and-minor:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

# Note: We intentionally do not scan benchmark directories as they:
# - Are not part of the distributed package
# - Contain outdated dependencies for comparison purposes
# - Are only used in isolated development environments
