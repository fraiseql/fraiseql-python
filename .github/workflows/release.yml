name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # Create GitHub release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create or update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE=""
          if echo "$GITHUB_REF" | grep -qE '(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Release $GITHUB_REF_NAME" \
              $PRERELEASE
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Release $GITHUB_REF_NAME" \
              --generate-notes \
              $PRERELEASE
          fi

  # Build wheels for each platform
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin-args: --manylinux 2_38
          - os: macos-latest
            target: aarch64-apple-darwin
            maturin-args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            maturin-args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install patchelf (Linux only)
        if: runner.os == 'Linux'
        run: pip install patchelf

      - name: Build wheel
        run: |
          pip install maturin
          maturin build --release --target ${{ matrix.target }} ${{ matrix.maturin-args }}
          mkdir -p dist/
          cp fraiseql_rs/target/wheels/*.whl dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # Build source distribution
  build-sdist:
    name: Build sdist
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build sdist
        run: |
          pip install maturin
          maturin sdist
          mkdir -p dist/
          cp fraiseql_rs/target/wheels/*.tar.gz dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Publish all artifacts to PyPI
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List distributions
        run: ls -lh dist/

      - name: Fix wheel metadata (remove license-file)
        run: |
          python << 'SCRIPT'
          import zipfile
          import os
          import tempfile
          import shutil
          from pathlib import Path

          for wheel_path in Path("dist").glob("*.whl"):
              temp_dir = tempfile.mkdtemp()
              try:
                  # Extract wheel
                  with zipfile.ZipFile(wheel_path, 'r') as z:
                      z.extractall(temp_dir)

                  # Find and fix METADATA file
                  for metadata_path in Path(temp_dir).glob("*/METADATA"):
                      with open(metadata_path, 'r') as f:
                          lines = f.readlines()
                      # Remove License-File lines
                      fixed = [l for l in lines if not l.startswith('License-File:')]
                      with open(metadata_path, 'w') as f:
                          f.writelines(fixed)

                  # Recreate wheel
                  wheel_path.unlink()
                  with zipfile.ZipFile(wheel_path, 'w', zipfile.ZIP_DEFLATED) as z:
                      for root, dirs, files in os.walk(temp_dir):
                          for file in files:
                              file_path = os.path.join(root, file)
                              arcname = os.path.relpath(file_path, temp_dir)
                              z.write(file_path, arcname)
              finally:
                  shutil.rmtree(temp_dir)
          SCRIPT

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/* --skip-existing
