name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # Create GitHub release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create or update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE=""
          if echo "$GITHUB_REF" | grep -qE '(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Release $GITHUB_REF_NAME" \
              $PRERELEASE
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Release $GITHUB_REF_NAME" \
              --generate-notes \
              $PRERELEASE
          fi

  # Build wheels for each platform
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin-args: --manylinux 2_28
          - os: macos-13
            target: x86_64-apple-darwin
            maturin-args: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            maturin-args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            maturin-args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install patchelf (Linux only)
        if: runner.os == 'Linux'
        run: pip install patchelf

      - name: Build wheel
        run: |
          pip install maturin
          maturin build --release --target ${{ matrix.target }} ${{ matrix.maturin-args }}
          mkdir -p dist/
          cp fraiseql_rs/target/wheels/*.whl dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # Build source distribution
  build-sdist:
    name: Build sdist
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build sdist
        run: |
          pip install maturin
          maturin sdist
          mkdir -p dist/
          cp fraiseql_rs/target/wheels/*.tar.gz dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Publish all artifacts to PyPI
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List distributions
        run: ls -lh dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/* --skip-existing
