# Pre-commit hooks for FraiseQL Python framework
# Install: pip install pre-commit && pre-commit install

# pre-commit.ci configuration: skip Rust hooks (cargo not available in CI)
ci:
  # Skip hooks that require system dependencies not available in pre-commit.ci:
  # - fmt, clippy, cargo-audit: require cargo (Rust toolchain)
  # - markdownlint: hundreds of pre-existing violations in archived/legacy docs
  skip: [fmt, clippy, cargo-audit, markdownlint]

repos:
  # Rust formatting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: cargo fmt
        description: Format Rust code with rustfmt
        entry: cargo fmt --manifest-path fraiseql_rs/Cargo.toml --
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: cargo clippy
        description: Lint Rust code with Clippy
        entry: cargo clippy --manifest-path fraiseql_rs/Cargo.toml --all-features
        language: system
        types: [rust]
        pass_filenames: false
        args: []

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: 'deploy/kubernetes/helm/.*'
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # TOML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-toml
        args: [--autofix]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--fix]

  # Security check
  - repo: local
    hooks:
      - id: cargo-audit
        name: cargo audit
        description: Check for security vulnerabilities
        entry: cargo audit --manifest-path fraiseql_rs/Cargo.toml
        language: system
        pass_filenames: false
        stages: [pre-push]
